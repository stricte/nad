name: Python Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        run: python -m compileall .

      - name: Run unit tests
        run: |
          if [ -d tests ] && find tests -type f -name 'test*.py' | grep -q .; then
            python -m unittest discover -s tests -v
          else
            echo "No Python test files found; skipping unittest discovery."
          fi
